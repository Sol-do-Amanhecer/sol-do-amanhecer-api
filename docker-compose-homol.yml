version: "3.0"

services:
  postgres-homol-service:
    build:
      context: .
      dockerfile: ./docker-config/db/Dockerfile
    container_name: sol-do-amanhecer-postgres-homol
    volumes:
      - postgres_data_homol:/var/lib/postgresql/data
    ports:
      - ${POSTGRES_HOST_PORT}:${POSTGRES_PORT}
    networks:
      - sol-do-amanhecer-network-homol
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    restart: always

  api-homol-service:
    build:
      context: .
      dockerfile: ./docker-config/app/Dockerfile
    container_name: sol-do-amanhecer-api-homol
    depends_on:
      - postgres-homol-service
    ports:
      - ${APP_HOST_PORT}:${APP_PORT}
    networks:
      - sol-do-amanhecer-network-homol
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      APP_PORT: ${APP_PORT}
      POSTGRES_HOST: postgres-homol-service
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: always

networks:
  sol-do-amanhecer-network-homol:

volumes:
  postgres_data_homol: