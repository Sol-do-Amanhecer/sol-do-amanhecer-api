# H2 in-memory database for integration tests
spring.datasource.url=jdbc:h2:mem:solamanhecer_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 console (optional)
spring.h2.console.enabled=true

# SQL init
spring.sql.init.mode=never

# JWT test configuration
security.jwt.token.secret-key=integration-test-secret
security.jwt.token.expire-length=3600000

# Mail defaults (avoid real SMTP during tests)
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.test-connection=false

# Logging
logging.level.root=INFO
logging.level.br.com.sol_do_amanhecer=DEBUG
