spring:
  application:
    name: sol-do-amanhecer-api

  profiles:
    active: test

  datasource:
    url: jdbc:h2:mem:${H2_DB_NAME:sol-do-amanhecer-db}
    driverClassName: org.h2.Driver
    username: ${H2_USER:sa}
    password: ${H2_PASS:}

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update

  h2:
    console:
      enabled: true
      path: /h2-console