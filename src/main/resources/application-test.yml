spring:
  application:
    name: sol-do-amanhecer-api

  profiles:
    active: test

  datasource:
    url: jdbc:h2:mem:sol-do-amanhecer-db
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update

  h2:
    console:
      enabled: true
      path: /h2-console
