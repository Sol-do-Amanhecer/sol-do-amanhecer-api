version: "3.0"

services:
  postgres-service:
    build:
      context: .
      dockerfile: ./docker-config/db/Dockerfile
    container_name: sol-do-amanhecer-postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - ${POSTGRES_PORT}:${POSTGRES_PORT}
    networks:
      - sol-do-amanhecer-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  api-service:
    build:
      context: .
      dockerfile: ./docker-config/app/Dockerfile
    container_name: sol-do-amanhecer-api
    depends_on:
      - postgres-service
    ports:
      - ${APP_PORT}:${APP_PORT}
    networks:
      - sol-do-amanhecer-network
    environment:
      SPRING_PROFILES_ACTIVE: homol

networks:
  sol-do-amanhecer-network:

volumes:
  postgres_data: