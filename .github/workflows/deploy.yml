name: Deploy Encadeado Homologação & Produção

on:
    push:
        branches:
            - main

jobs:
    deploy-homolog:
        name: Deploy Homologação
        runs-on: ubuntu-latest

        steps:
            - name: Checkout código
              uses: actions/checkout@v3

            - name: Configurar chave SSH
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.SSH_PRIVATE_KEY_HOMOL }}" > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa
                  ssh-keyscan -H ${{ secrets.VPS_HOST_HOMOL }} >> ~/.ssh/known_hosts

            - name: Deploy seguro na Homologação
              run: |
                  ssh ${{ secrets.VPS_USER_HOMOL }}@${{ secrets.VPS_HOST_HOMOL }} << 'EOF'
                    set -e
                    cd ${{ secrets.VPS_BACKEND_PATH_HOMOL }}

                    echo "Buildando a imagem nova..."
                    docker compose -f docker-compose-homol.yml --env-file .env.homol build

                    echo "Subindo NOVA aplicação..."
                    docker compose -f docker-compose-homol.yml --env-file .env.homol up -d

                    echo "Aguardando aplicação iniciar..."
                    sleep 15

                    echo "Verificando saúde dos serviços..."
                    HEALTH_ENDPOINT=http://213.136.68.204:8081/sol-do-amanhecer/api/actuator/health
                    if curl -sf $HEALTH_ENDPOINT | grep -q UP; then
                      echo "✅ Deploy HOMOLOGAÇÃO saudável!"
                    else
                      echo "❌ Deploy falhou! Restaurando versão anterior..."
                      docker compose -f docker-compose-homol.yml --env-file .env.homol down
                      docker compose -f docker-compose-homol.yml --env-file .env.homol up -d
                      exit 1
                    fi
                  EOF

    deploy-prod:
        name: Deploy Produção
        runs-on: ubuntu-latest
        needs: deploy-homolog

        steps:
            - name: Checkout código
              uses: actions/checkout@v3

            - name: Configurar chave SSH
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.SSH_PRIVATE_KEY_PROD }}" > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa
                  ssh-keyscan -H ${{ secrets.VPS_HOST_PROD }} >> ~/.ssh/known_hosts

            - name: Deploy na Produção
              run: |
                  ssh ${{ secrets.VPS_USER_PROD }}@${{ secrets.VPS_HOST_PROD }} << 'EOF'
                    set -e
                    cd ${{ secrets.VPS_BACKEND_PATH_PROD }}

                    echo "Buildando imagem produção..."
                    docker compose -f docker-compose-prod.yml --env-file .env.prod build

                    echo "Subindo aplicação PROD..."
                    docker compose -f docker-compose-prod.yml --env-file .env.prod up -d

                    echo "Aguardando inicialização..."
                    sleep 15

                    echo "Verificando saúde dos serviços..."
                    HEALTH_ENDPOINT=http://213.136.68.204:8082/sol-do-amanhecer/api/actuator/health
                    if curl -sf $HEALTH_ENDPOINT | grep -q UP; then
                      echo "✅ Deploy PRODUÇÃO saudável!"
                    else
                      echo "❌ [ALERTA] Deploy da produção subiu, mas não está saudável. Verifique!"
                      docker compose -f docker-compose-prod.yml --env-file .env.prod logs
                      exit 1
                    fi
                  EOF