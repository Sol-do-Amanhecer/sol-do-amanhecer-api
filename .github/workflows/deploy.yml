name: Deploy Encadeado Homologação & Produção

on:
    push:
        branches:
            - main

jobs:
    deploy-homolog:
        name: Deploy Homologação
        runs-on: ubuntu-latest

        env:
            SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
            VPS_HOST: ${{ secrets.VPS_HOST }}
            VPS_USER: ${{ secrets.VPS_USER }}
            VPS_BACKEND_PATH: ${{ secrets.VPS_BACKEND_PATH }}
            DOCKER_COMPOSE_FILE_HOMOL: docker-compose-homol.yml
            ENV_FILE_HOMOL: .env.homol
            HEALTH_ENDPOINT_HOMOL: http://213.136.68.204:8081/sol-do-amanhecer/api/actuator/health
            # Adicione abaixo apenas se for usar SECRETS!!
            # GITHUB_USERNAME: Sol-do-amanhecer
            # GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        steps:
            - name: Checkout código
              uses: actions/checkout@v3

            - name: Configurar chave SSH
              run: |
                  mkdir -p ~/.ssh
                  echo "${SSH_PRIVATE_KEY}" > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa
                  ssh-keyscan -H ${VPS_HOST} >> ~/.ssh/known_hosts

            - name: Deploy seguro na Homologação
              run: |
                  ssh ${VPS_USER}@${VPS_HOST} << 'EOF'
                    set -e
                    # cd ${VPS_BACKEND_PATH}
                    cd /home/soldoamanhecer/sol-do-amanhecer-api/
                    pwd
                    ls -la

                    
                    echo "Atualizando código do projeto (git pull origin main)..."
                    git pull git@github.com:Sol-do-Amanhecer/sol-do-amanhecer-api.git main
                  
                    echo "Removendo containers antigos de homologação (se existirem)..."
                    docker rm -f sol-do-amanhecer-postgres-homol || true
                    docker rm -f sol-do-amanhecer-api-homol || true
                  
                    echo "Atualizando imagens docker remotas, se houver..."
                    docker-compose -f ${DOCKER_COMPOSE_FILE_HOMOL} --env-file ${ENV_FILE_HOMOL} pull
                  
                    echo "Buildando imagens homologação..."
                    docker-compose -f ${DOCKER_COMPOSE_FILE_HOMOL} --env-file ${ENV_FILE_HOMOL} build
                  
                    echo "Subindo containers de homologação..."
                    docker-compose -f ${DOCKER_COMPOSE_FILE_HOMOL} --env-file ${ENV_FILE_HOMOL} up -d
                  
                    echo "Aguardando a aplicação iniciar..."
                    sleep 60
                  
                    echo "Verificando saúde dos serviços..."
                    if curl -sf ${HEALTH_ENDPOINT_HOMOL} | grep -q UP; then
                      echo "✅ Deploy Homologação saudável!"
                    else
                      echo "❌ Deploy de Homologação falhou! Verifique os logs abaixo."
                      docker-compose -f ${DOCKER_COMPOSE_FILE_HOMOL} --env-file ${ENV_FILE_HOMOL} logs
                      exit 1
                    fi
                  EOF

    deploy-prod:
        name: Deploy Produção
        runs-on: ubuntu-latest
        needs: deploy-homolog

        env:
            SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
            VPS_HOST: ${{ secrets.VPS_HOST }}
            VPS_USER: ${{ secrets.VPS_USER }}
            VPS_BACKEND_PATH: ${{ secrets.VPS_BACKEND_PATH }}
            DOCKER_COMPOSE_FILE_PROD: docker-compose-prod.yml
            ENV_FILE_PROD: .env.prod
            HEALTH_ENDPOINT_PROD: http://213.136.68.204:8083/sol-do-amanhecer/api/actuator/health
            # Adicione abaixo apenas se for usar SECRETS!!
            # GITHUB_USERNAME: Sol-do-amanhecer
            # GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        steps:
            - name: Checkout código
              uses: actions/checkout@v3

            - name: Configurar chave SSH
              run: |
                  mkdir -p ~/.ssh
                  echo "${SSH_PRIVATE_KEY}" > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa
                  ssh-keyscan -H ${VPS_HOST} >> ~/.ssh/known_hosts

            - name: Deploy seguro na Produção
              run: |
                  ssh ${VPS_USER}@${VPS_HOST} << 'EOF'
                    set -e
                    cd ${VPS_BACKEND_PATH}
                  
                    echo "Atualizando código do projeto (git pull origin main)..."
                    git pull git@github.com:Sol-do-Amanhecer/sol-do-amanhecer-api.git main
                  
                    echo "Removendo containers antigos de produção (se existirem)..."
                    docker rm -f sol-do-amanhecer-postgres-prod || true
                    docker rm -f sol-do-amanhecer-api-prod || true
                  
                    echo "Atualizando imagens docker remotas, se houver..."
                    docker-compose -f ${DOCKER_COMPOSE_FILE_PROD} --env-file ${ENV_FILE_PROD} pull
                  
                    echo "Buildando imagens produção..."
                    docker-compose -f ${DOCKER_COMPOSE_FILE_PROD} --env-file ${ENV_FILE_PROD} build
                  
                    echo "Subindo containers de produção..."
                    docker-compose -f ${DOCKER_COMPOSE_FILE_PROD} --env-file ${ENV_FILE_PROD} up -d
                  
                    echo "Aguardando a aplicação iniciar..."
                    sleep 60
                  
                    echo "Verificando saúde dos serviços..."
                    if curl -sf ${HEALTH_ENDPOINT_PROD} | grep -q UP; then
                      echo "✅ Deploy Produção saudável!"
                    else
                      echo "❌ Deploy de Produção falhou! Verifique os logs abaixo."
                      docker-compose -f ${DOCKER_COMPOSE_FILE_PROD} --env-file ${ENV_FILE_PROD} logs
                      exit 1
                    fi
                  EOF
